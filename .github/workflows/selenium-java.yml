name: ☕ Selenium Java BDD — CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Executa diariamente às 07:00 UTC (04:00 Brasília)
    - cron: '0 7 * * *'
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # =========================================================
  # JOB 1: Build e Testes Unitários (JUnit5)
  # =========================================================
  unit-tests:
    name: 🧪 Build + Testes Unitários (JUnit5)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: 🔨 Build e execução de unit tests
        run: mvn test -Dcucumber.filter.tags="not @orangehrm and not @login and not @api" --no-transfer-progress

      - name: 📊 Upload resultados dos testes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: target/surefire-reports/
          retention-days: 30

  # =========================================================
  # JOB 2: Testes de API (REST Assured)
  # =========================================================
  api-tests:
    name: 🔌 Testes de API (REST Assured)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: 🔌 Executar testes de API
        run: mvn test -Dcucumber.filter.tags="@api" --no-transfer-progress

      - name: 📊 Upload resultados Allure
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-api
          path: target/allure-results/
          retention-days: 30

  # =========================================================
  # JOB 3: Testes de UI — OrangeHRM (Chrome Headless)
  # =========================================================
  e2e-orangehrm:
    name: 🌐 E2E BDD — OrangeHRM (Chrome Headless)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: 🖥️ Setup Chrome (via actions)
        uses: browser-actions/setup-chrome@v1

      - name: 🎲 Executar testes OrangeHRM
        run: mvn test -Dcucumber.filter.tags="@orangehrm" --no-transfer-progress
        env:
          # Chrome headless configurado nos Hooks via ChromeOptions
          HEADLESS: 'true'

      - name: 📊 Upload resultados Allure
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-orangehrm
          path: target/allure-results/
          retention-days: 30

      - name: 📸 Upload screenshots em caso de falha
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: selenium-screenshots
          path: target/screenshots/
          retention-days: 7

  # =========================================================
  # JOB 4: Gerar Relatório Allure
  # =========================================================
  allure-report:
    name: 📊 Relatório Allure
    runs-on: ubuntu-latest
    needs: [ api-tests, e2e-orangehrm ]
    if: always()

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: 📥 Download resultados Allure (API)
        uses: actions/download-artifact@v4
        with:
          name: allure-results-api
          path: target/allure-results/
        continue-on-error: true

      - name: 📥 Download resultados Allure (OrangeHRM)
        uses: actions/download-artifact@v4
        with:
          name: allure-results-orangehrm
          path: target/allure-results/
        continue-on-error: true

      - name: 📊 Gerar relatório Allure
        run: mvn allure:report --no-transfer-progress

      - name: 🚀 Publicar relatório Allure
        uses: actions/upload-artifact@v4
        with:
          name: allure-html-report
          path: target/site/allure-maven-plugin/
          retention-days: 30

  # =========================================================
  # JOB 5: Resultado Final
  # =========================================================
  notify-result:
    name: 📢 Resultado Final
    runs-on: ubuntu-latest
    needs: [ unit-tests, api-tests, e2e-orangehrm ]
    if: always()

    steps:
      - name: ✅ Pipeline OK
        if: >
          needs.unit-tests.result == 'success' &&
          needs.api-tests.result == 'success'
        run: echo "✅ Todos os testes passaram!"

      - name: ❌ Pipeline com falhas
        if: >
          needs.unit-tests.result == 'failure' ||
          needs.api-tests.result == 'failure'
        run: |
          echo "❌ Falhas detectadas. Verifique os artefatos."
          exit 1
